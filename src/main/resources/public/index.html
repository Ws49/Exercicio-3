<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>CRUD de Carros</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .container {
      width: 800px;
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    input, button {
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
      border: none;
    }

    input {
      width: calc(33% - 10px);
      margin-right: 5px;
    }

    button {
      cursor: pointer;
      background: #3b82f6;
      color: white;
      transition: 0.2s;
    }

    button:hover {
      background: #2563eb;
    }

    .danger {
      background: #ef4444;
    }

    .danger:hover {
      background: #dc2626;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #334155;
      text-align: center;
    }

    .actions button {
      margin: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>CRUD de Carros</h1>

    <input type="text" id="modelo" placeholder="Modelo">
    <input type="text" id="marca" placeholder="Marca">
    <input type="number" id="ano" placeholder="Ano">

    <button onclick="addCar()">Adicionar</button>
    <button class="danger" onclick="deleteAll()">Apagar Todos</button>

    <table>
      <thead>
        <tr>
          <th>Modelo</th>
          <th>Marca</th>
          <th>Ano</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="carTable"></tbody>
    </table>
  </div>
</body>
</html>
